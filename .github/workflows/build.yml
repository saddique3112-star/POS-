name: Build Windows EXE

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      build_exe:
        description: 'Build EXE now?'
        required: true
        default: 'true'

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install tkinter
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y python3-tk tk-dev

      - name: Install optional packages
        run: pip install openpyxl reportlab python-barcode pillow

      - name: Run all tests
        run: python tests/test_pos_system.py

  build-exe:
    name: Build Windows EXE
    runs-on: windows-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pyinstaller openpyxl reportlab python-barcode pillow

      - name: Build EXE
        run: pyinstaller grocerypos.spec --clean --noconfirm

      - name: Create folders
        run: |
          mkdir dist\GroceryPOS_Pro\data
          mkdir dist\GroceryPOS_Pro\logs
          mkdir dist\GroceryPOS_Pro\backups
          mkdir dist\GroceryPOS_Pro\reports
          mkdir dist\GroceryPOS_Pro\assets
          copy README.md dist\GroceryPOS_Pro\README.md
        shell: cmd

      - name: Zip the output
        run: |
          Compress-Archive -Path "dist\GroceryPOS_Pro\*" -DestinationPath "GroceryPOS_Pro_Windows.zip"
        shell: powershell

      - name: Upload as artifact
        uses: actions/upload-artifact@v4
        with:
          name: GroceryPOS_Pro_Windows_EXE
          path: GroceryPOS_Pro_Windows.zip
          retention-days: 30

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build-exe
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: GroceryPOS_Pro_Windows_EXE
          path: release-files/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "GroceryPOS Pro ${{ github.ref_name }}"
          body: |
            ## GroceryPOS Pro ${{ github.ref_name }}
            
            ### Download & Install
            1. Download `GroceryPOS_Pro_Windows.zip` below
            2. Extract to any folder
            3. Run `GroceryPOS_Pro.exe`
            4. Login: **admin / admin123**
            
            ### Default Logins
            | Username | Password | Role |
            |---|---|---|
            | admin | admin123 | Administrator |
            | cashier1 | cash123 | Cashier |
            | manager | mgr123 | Manager |
          files: release-files/*.zip
